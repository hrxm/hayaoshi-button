<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>早押しボタン — 出題者</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #0d0d14; color: #fff; padding: 24px;
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; }
  a { color: #ff5252; }
  .hidden { display: none !important; }

  /* 作成 / 復帰フォーム */
  .create-wrap { min-height: 90vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .logo { font-size: 44px; font-weight: 900; color: #ff3b3b; letter-spacing: -2px; text-shadow: 0 0 30px rgba(255,59,59,.5); }
  .subtitle { font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 28px; letter-spacing:.1em; }
  .card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,59,59,.25); border-radius: 22px;
    padding: 30px 28px; width: 360px; max-width: 100%; text-align: center; }
  .card h2 { font-size: 18px; margin-bottom: 18px; }
  .card-or { margin: 18px 0; font-size: 13px; color: rgba(255,255,255,.3); position: relative; }
  .card-or::before, .card-or::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:rgba(255,255,255,.1); }
  .card-or::before { left:0; } .card-or::after { right:0; }
  .card2 { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.1); border-radius: 22px;
    padding: 22px 28px; width: 360px; max-width: 100%; text-align: center; margin-top: 4px; }
  .card2 h2 { font-size: 16px; margin-bottom: 14px; color: rgba(255,255,255,.6); }
  .pw-row { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 14px; font-size: 14px; color: rgba(255,255,255,.6); }
  input[type=text], input[type=password], input[type=number] { width: 100%; background: rgba(255,255,255,.08);
    border: 1.5px solid rgba(255,59,59,.3); border-radius: 12px; padding: 13px 16px; font-size: 16px;
    color: #fff; outline: none; text-align: center; font-family: inherit; margin-bottom: 14px; }
  input:focus { border-color: #ff3b3b; }
  .rejoin-code { letter-spacing: 6px; font-weight: 900; font-size: 22px; text-transform: uppercase; }
  button { background: linear-gradient(135deg, #ff5252, #ff1744); color: #fff; border: none;
    border-radius: 12px; padding: 15px; font-size: 17px; font-weight: 900; cursor: pointer;
    font-family: inherit; width: 100%; box-shadow: 0 4px 20px rgba(255,23,68,.3); transition: transform .1s; }
  button:active { transform: scale(.98); }
  button:disabled { opacity: .4; cursor: default; }
  .btn-rejoin { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.7);
    box-shadow: none; font-size: 15px; padding: 13px; }

  /* ダッシュボード */
  header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .room-info { display: flex; align-items: baseline; gap: 14px; }
  .room-code { font-size: 40px; font-weight: 900; color: #ff3b3b; letter-spacing: 6px; }
  .join-url { font-size: 13px; color: rgba(255,255,255,.5); }
  .join-url b { color: #ffd54a; }
  .qbadge { font-size: 22px; font-weight: 900; color: #ffd54a; }

  .main { display: grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start; }
  @media (max-width: 820px) { .main { grid-template-columns: 1fr; } }

  .panel { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 22px; margin-bottom: 0; }
  .panel h3 { font-size: 13px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px; }

  textarea { width: 100%; min-height: 70px; background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,59,59,.25);
    border-radius: 12px; padding: 12px 14px; font-size: 16px; color: #fff; outline: none; font-family: inherit; resize: vertical; }

  /* ポイント設定行 */
  .pts-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; color: rgba(255,255,255,.6); }
  .pts-row input { width: 70px; margin: 0; padding: 8px 10px; font-size: 16px; }

  .q-display { font-size: 30px; font-weight: 800; line-height: 1.5; min-height: 90px; margin: 18px 0; }
  .q-display .cursor { color: #ff5252; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .buzz-box { text-align: center; padding: 24px; border-radius: 16px; background: rgba(255,255,255,.03); margin: 16px 0; transition: all .3s; }
  .buzz-box.active { background: rgba(255,213,74,.12); border: 1px solid rgba(255,213,74,.4); transform: scale(1.01); }
  .buzz-box .label { font-size: 14px; color: rgba(255,255,255,.4); }
  .buzz-box .who { font-size: 34px; font-weight: 900; color: #ffd54a; margin-top: 6px; min-height: 42px; }

  .judge-row { display: flex; gap: 8px; margin-top: 8px; }
  .judge-row button { flex: 1; padding: 13px 6px; font-size: 15px; }
  .btn-ok   { background: linear-gradient(135deg, #66bb6a, #2e7d32); box-shadow: 0 4px 20px rgba(76,175,80,.3); }
  .btn-ng   { background: linear-gradient(135deg, #ef5350, #c62828); box-shadow: 0 4px 20px rgba(229,57,53,.3); }
  .btn-cancel { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.6); box-shadow: none; font-size: 13px; }
  .btn-next { background: linear-gradient(135deg, #ffca28, #ff8f00); color: #0d0d14; margin-top: 12px; }
  .btn-ghost { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.5); box-shadow: none; }

  /* スコアボード */
  .player-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 12px;
    background: rgba(255,255,255,.04); margin-bottom: 8px; transition: background .3s; }
  .player-row.lead { background: rgba(255,213,74,.12); }
  .player-row .rank { width: 26px; font-weight: 900; color: rgba(255,255,255,.4); text-align: center; }
  .player-row .em { font-size: 22px; }
  .player-row .nm { flex: 1; font-weight: 700; }
  .player-row .sc { font-size: 22px; font-weight: 900; color: #ffd54a; min-width: 34px; text-align: right; }
  .player-row .adj { display: flex; gap: 4px; }
  .player-row .adj button { width: 28px; height: 28px; padding: 0; font-size: 16px; border-radius: 8px;
    background: rgba(255,255,255,.08); box-shadow: none; }
  .empty { color: rgba(255,255,255,.25); text-align: center; padding: 20px; font-size: 14px; }

  /* 履歴 */
  .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .history-header h3 { margin: 0; }
  .btn-clear { width: auto; padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.4); box-shadow: none; border-radius: 8px; }
  .history-list { max-height: 220px; overflow-y: auto; }
  .history-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 10px;
    background: rgba(255,255,255,.03); margin-bottom: 6px; font-size: 14px; }
  .history-row .hq { color: rgba(255,255,255,.35); min-width: 40px; font-size: 12px; }
  .history-row .hname { flex: 1; font-weight: 700; }
  .history-row .hpts { color: #4caf50; font-weight: 900; }

  /* オーバーレイ */
  .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 50; opacity: 0; pointer-events: none; transition: opacity .3s; background: rgba(13,13,20,.92); }
  .overlay.show { opacity: 1; }
  .overlay .big { font-size: 120px; font-weight: 900; }
  .overlay .who { font-size: 26px; }
  .overlay .pts-badge { font-size: 18px; color: #ffd54a; font-weight: 700; }
  .overlay.correct .big { color: #4caf50; text-shadow: 0 0 50px rgba(76,175,80,.6); }
  .overlay.wrong .big   { color: #ff5252; text-shadow: 0 0 50px rgba(255,82,82,.6); }
  .toolbar { display: flex; gap: 8px; }
  .toolbar button { width: auto; padding: 10px 16px; font-size: 13px; }
</style>
</head>
<body>
  <!-- ルーム作成 / 復帰 -->
  <div class="create-wrap" id="createView">
    <div class="logo">早押しボタン</div>
    <div class="subtitle">出題者ページ / 中央スクリーン</div>

    <!-- 新規作成 -->
    <div class="card">
      <h2>ルームを作る</h2>
      <div class="pw-row">
        <label><input type="checkbox" id="pwToggle" onchange="togglePw()"> パスワードを付ける</label>
      </div>
      <input type="text" id="pwInput" placeholder="パスワード" class="hidden" maxlength="20">
      <button id="createBtn" onclick="createRoom()">ルーム作成！</button>
    </div>

    <div class="card-or">または</div>

    <!-- 復帰 -->
    <div class="card2">
      <h2>ルームに戻る（再接続）</h2>
      <input type="text" id="rejoinCode" class="rejoin-code" placeholder="XXXX" maxlength="4" autocapitalize="characters" autocomplete="off">
      <input type="text" id="rejoinPw" placeholder="パスワード（設定した場合）" maxlength="20" autocomplete="off">
      <button class="btn-rejoin" onclick="rejoinRoom()">🔁 ルームに戻る</button>
    </div>
  </div>

  <!-- ダッシュボード -->
  <div id="dashView" class="hidden">
    <header>
      <div class="room-info">
        <div class="room-code" id="roomCode"></div>
        <div class="join-url">参加URL: <b id="joinUrl"></b></div>
      </div>
      <div class="qbadge" id="qbadge">第 1 問</div>
      <div class="toolbar">
        <button class="btn-ghost" onclick="resetAll()">🔄 全リセット</button>
      </div>
    </header>

    <div class="main">
      <!-- 左：問題・回答操作 -->
      <div>
        <div class="panel" style="margin-bottom:16px">
          <h3>問題</h3>
          <textarea id="qInput" placeholder="問題文（任意）。空のままでもOK → 「第○問」だけ表示" maxlength="100" oninput="document.getElementById('qCharCount').textContent=this.value.length"></textarea>
          <div style="text-align:right;font-size:11px;color:rgba(255,255,255,.3);margin-top:2px"><span id="qCharCount">0</span>/100</div>
          <div class="pts-row">
            <span>この問題のポイント：</span>
            <input type="number" id="ptsInput" value="1" min="1" max="99">
            <span>点</span>
          </div>
          <button class="btn-next" onclick="askQuestion()">📢 この問題を出す（流す）</button>
          <div class="q-display" id="qDisplay"></div>

          <div class="buzz-box" id="buzzBox">
            <div class="label">回答中</div>
            <div class="who" id="buzzWho">― まだ誰も押していません ―</div>
          </div>
          <div class="judge-row">
            <button class="btn-ok" id="okBtn" onclick="judge('correct')" disabled>⭕ 正解</button>
            <button class="btn-ng" id="ngBtn" onclick="judge('wrong')" disabled>❌ 不正解</button>
            <button class="btn-cancel" id="cancelBtn" onclick="cancelBuzz()" disabled>↩ キャンセル</button>
          </div>
          <button class="btn-next" onclick="nextQuestion()">▶ 次の問題へ</button>
        </div>

        <!-- 履歴 -->
        <div class="panel">
          <div class="history-header">
            <h3>正解履歴</h3>
            <button class="btn-clear" onclick="clearHistory()">履歴を消去</button>
          </div>
          <div class="history-list" id="historyList"><div class="empty">まだ正解者はいません</div></div>
        </div>
      </div>

      <!-- 右：得点ランキング -->
      <div class="panel">
        <h3>得点ランキング</h3>
        <div id="scoreboard"><div class="empty">まだ誰も参加していません</div></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="big" id="ovBig"></div>
    <div class="who" id="ovWho"></div>
    <div class="pts-badge" id="ovPts"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="common.js"></script>
  <script>
    let code = sanitizeCode(param('room'));
    let roomRef = null, currentBuzz = null, lastResultTs = 0, lastQText = null, lastYajiTs = 0;
    let currentQNum = 1;

    if (code) { startDashboard(); }

    // ── 入力トグル ─────────────────────────────────────────────
    function togglePw() {
      document.getElementById('pwInput').classList.toggle('hidden', !document.getElementById('pwToggle').checked);
    }

    // ── ルーム作成 ──────────────────────────────────────────────
    async function createRoom() {
      const btn = document.getElementById('createBtn');
      const usePw = document.getElementById('pwToggle').checked;
      const pw = usePw ? document.getElementById('pwInput').value.trim() : '';
      if (usePw && !pw) { alert('パスワードを入れてね'); return; }
      btn.disabled = true; btn.textContent = '作成中…';
      try {
        let newCode = null;
        for (let i = 0; i < 5; i++) {
          const c = genRoomCode();
          const snap = await db.ref('rooms/' + c + '/meta').get();
          if (!snap.exists()) { newCode = c; break; }
        }
        if (!newCode) { alert('ルーム作成に失敗しました。もう一度試してね。'); btn.disabled = false; btn.textContent = 'ルーム作成！'; return; }
        await db.ref('rooms/' + newCode + '/meta').set({
          password: pw, questionNumber: 1, questionText: '', result: null,
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });
        location.href = 'host.html?room=' + newCode;
      } catch (e) {
        btn.disabled = false; btn.textContent = 'ルーム作成！';
        alert('作成エラー: ' + (e.message || e));
      }
    }

    // ── ルーム復帰（再接続）────────────────────────────────────
    async function rejoinRoom() {
      const inputCode = sanitizeCode(document.getElementById('rejoinCode').value);
      const inputPw   = document.getElementById('rejoinPw').value.trim();
      if (!inputCode) { alert('ルームコードを入れてね'); return; }
      try {
        const snap = await db.ref('rooms/' + inputCode + '/meta').get();
        if (!snap.exists()) { alert('そのルームは見つかりません'); return; }
        const meta = snap.val();
        if (meta.password && meta.password !== inputPw) { alert('パスワードが違います'); return; }
        location.href = 'host.html?room=' + inputCode;
      } catch (e) { alert('接続エラー: ' + (e.message || e)); }
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('rejoinCode').addEventListener('keydown', e => { if (e.key==='Enter') rejoinRoom(); });
    });

    // ── ダッシュボード起動 ─────────────────────────────────────
    function startDashboard() {
      document.getElementById('createView').classList.add('hidden');
      document.getElementById('dashView').classList.remove('hidden');
      document.getElementById('roomCode').textContent = code;
      const base = location.href.replace(/host\.html.*$/, 'index.html');
      document.getElementById('joinUrl').textContent = base + '?room=' + code;

      // LocalStorageに最後のルームを保存（次回復帰のヒント）
      localStorage.setItem('lastRoom', code);

      roomRef = db.ref('rooms/' + code);
      roomRef.child('meta/questionNumber').on('value', s => {
        currentQNum = s.val() || 1;
        document.getElementById('qbadge').textContent = '第 ' + currentQNum + ' 問';
      });
      roomRef.child('meta/questionText').on('value', s => {
        const t = s.val() || '';
        if (t === lastQText) return;
        lastQText = t; streamText(t);
      });
      roomRef.child('buzz').on('value', s => { currentBuzz = s.val(); renderBuzz(); });
      roomRef.child('meta/result').on('value', s => {
        const r = s.val();
        if (!r || !r.ts || r.ts === lastResultTs) return;
        lastResultTs = r.ts; showResult(r.type, r.name, r.pts);
      });
      roomRef.child('players').on('value', s => renderScoreboard(s.val() || {}));
      roomRef.child('history').on('value', s => renderHistory(s.val() || {}));
      roomRef.child('yaji').on('value', s => {
        const y = s.val();
        if (!y || !y.ts || y.ts === lastYajiTs) return;
        lastYajiTs = y.ts; playYaji(y.i);
      });

      // 前回のルームコードを復帰フォームに入れておく（戻った時用）
      document.getElementById('rejoinCode').value = code;
    }

    // ページロード時、LocalStorageの前回コードを復帰フォームへ
    window.addEventListener('load', () => {
      if (!code) {
        const last = localStorage.getItem('lastRoom');
        if (last) document.getElementById('rejoinCode').value = last;
      }
    });

    // ── 問題文ストリーミング ────────────────────────────────────
    let streamTimer = null;
    function streamText(text) {
      clearInterval(streamTimer);
      const el = document.getElementById('qDisplay');
      if (!text) { el.innerHTML = ''; return; }
      let i = 0;
      el.innerHTML = '<span class="cursor">|</span>';
      streamTimer = setInterval(() => {
        i++;
        el.innerHTML = escHtml(text.slice(0, i)) + (i < text.length ? '<span class="cursor">|</span>' : '');
        if (i >= text.length) clearInterval(streamTimer);
      }, 60);
    }

    // ── 出題 ────────────────────────────────────────────────────
    function askQuestion() {
      ctx();
      const t = document.getElementById('qInput').value;
      roomRef.child('meta/questionText').set(t);
      roomRef.child('buzz').set(null); // 早押し受付開始
      playQuestion();
    }

    // ── 早押し表示 ──────────────────────────────────────────────
    function renderBuzz() {
      const box = document.getElementById('buzzBox');
      const who = document.getElementById('buzzWho');
      const ok = document.getElementById('okBtn'), ng = document.getElementById('ngBtn');
      const cancel = document.getElementById('cancelBtn');
      const pts = currentPts();
      if (currentBuzz) {
        box.classList.add('active');
        who.textContent = (currentBuzz.emoji || '') + ' ' + currentBuzz.name + ' さん';
        ok.textContent = '⭕ 正解 +' + pts;
        ok.disabled = false; ng.disabled = false; cancel.disabled = false;
      } else {
        box.classList.remove('active');
        who.textContent = '― まだ誰も押していません ―';
        ok.textContent = '⭕ 正解'; ok.disabled = true; ng.disabled = true; cancel.disabled = true;
      }
    }

    function currentPts() {
      return Math.max(1, parseInt(document.getElementById('ptsInput').value, 10) || 1);
    }

    // ── 判定 ────────────────────────────────────────────────────
    function judge(type) {
      if (!currentBuzz) return;
      ctx();
      const name = currentBuzz.name, targetId = sanitizeId(currentBuzz.id);
      const pts = currentPts();
      if (type === 'correct') {
        roomRef.child('players/' + targetId + '/score').transaction(v => (v || 0) + pts);
        roomRef.child('meta/result').set({ type: 'correct', name, pts, ts: Date.now() });
        // 履歴に追記
        roomRef.child('history').push({ name, pts, q: currentQNum, ts: Date.now() });
      } else {
        roomRef.child('meta/result').set({ type: 'wrong', name, pts: 0, ts: Date.now() });
        roomRef.child('buzz').set(null); // 不正解：全員また押せる
      }
    }

    // ── 解答キャンセル ──────────────────────────────────────────
    function cancelBuzz() {
      roomRef.child('buzz').set(null);
    }

    // ── 次の問題 ────────────────────────────────────────────────
    function nextQuestion() {
      roomRef.child('buzz').set(null);
      roomRef.child('meta/result').set(null);
      roomRef.child('meta/questionText').set('');
      document.getElementById('qInput').value = '';
      document.getElementById('ptsInput').value = '1';
      roomRef.child('meta/questionNumber').transaction(v => (v || 1) + 1);
      lastQText = '';
      document.getElementById('qDisplay').innerHTML = '';
    }

    // ── 全リセット ──────────────────────────────────────────────
    function resetAll() {
      if (!confirm('全員の得点を0に戻し、履歴も消去しますか？')) return;
      roomRef.child('players').get().then(s => {
        const players = s.val() || {};
        Object.keys(players).forEach(id => roomRef.child('players/' + id + '/score').set(0));
      });
      roomRef.child('buzz').set(null);
      roomRef.child('meta/result').set(null);
      roomRef.child('meta/questionText').set('');
      roomRef.child('meta/questionNumber').set(1);
      roomRef.child('history').set(null);
      lastQText = ''; document.getElementById('qInput').value = '';
      document.getElementById('ptsInput').value = '1';
      document.getElementById('qDisplay').innerHTML = '';
    }

    // ── 履歴消去のみ ────────────────────────────────────────────
    function clearHistory() {
      if (!confirm('正解履歴を消去しますか？（得点はそのままです）')) return;
      roomRef.child('history').set(null);
    }

    // ── スコアボード描画 ────────────────────────────────────────
    function renderScoreboard(players) {
      const board = document.getElementById('scoreboard');
      const arr = Object.entries(players).map(([id, p]) => ({ id, ...p }));
      if (arr.length === 0) { board.innerHTML = '<div class="empty">まだ誰も参加していません</div>'; return; }
      arr.sort((a, b) => (b.score || 0) - (a.score || 0));
      const medal = ['🥇', '🥈', '🥉'];
      board.innerHTML = '';
      arr.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'player-row' + (i === 0 && (p.score || 0) > 0 ? ' lead' : '');
        row.innerHTML =
          '<div class="rank">' + (medal[i] || (i + 1)) + '</div>' +
          '<div class="em">' + (p.emoji || '') + '</div>' +
          '<div class="nm">' + escHtml(p.name) + '</div>' +
          '<div class="adj"><button title="-1">−</button><button title="+1">＋</button></div>' +
          '<div class="sc">' + (p.score || 0) + '</div>';
        const [minus, plus] = row.querySelectorAll('.adj button');
        minus.onclick = () => roomRef.child('players/' + p.id + '/score').transaction(v => Math.max(0, (v || 0) - 1));
        plus.onclick  = () => roomRef.child('players/' + p.id + '/score').transaction(v => (v || 0) + 1);
        board.appendChild(row);
      });
    }

    // ── 履歴描画 ─────────────────────────────────────────────────
    function renderHistory(data) {
      const list = document.getElementById('historyList');
      const entries = Object.values(data || {}).sort((a, b) => (a.ts || 0) - (b.ts || 0));
      if (entries.length === 0) { list.innerHTML = '<div class="empty">まだ正解者はいません</div>'; return; }
      list.innerHTML = '';
      entries.forEach(h => {
        const row = document.createElement('div');
        row.className = 'history-row';
        row.innerHTML =
          '<div class="hq">Q' + (h.q || '?') + '</div>' +
          '<div class="hname">' + escHtml(h.name || '') + '</div>' +
          '<div class="hpts">+' + (h.pts || 0) + '点</div>';
        list.appendChild(row);
      });
      list.scrollTop = list.scrollHeight;
    }

    // ── 判定演出 ─────────────────────────────────────────────────
    function showResult(type, name, pts) {
      const ov = document.getElementById('overlay');
      document.getElementById('ovBig').textContent = type === 'correct' ? '⭕' : '❌';
      document.getElementById('ovWho').textContent =
        (name ? name + ' さん' : '') + (type === 'correct' ? ' 正解！' : ' 残念…');
      document.getElementById('ovPts').textContent =
        type === 'correct' ? '+' + (pts || 1) + '点 獲得！' : '';
      ov.className = 'overlay show ' + type;
      if (type === 'correct') playCorrect(); else playWrong();
      flash(type === 'correct' ? 'rgba(76,175,80,.15)' : 'rgba(255,82,82,.15)');
      setTimeout(() => { ov.className = 'overlay'; }, 2400);
    }
  </script>
</body>
</html>
