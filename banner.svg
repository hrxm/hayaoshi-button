<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a14"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </radialGradient>
    <radialGradient id="btnGrad" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ff7878"/>
      <stop offset="50%" stop-color="#ff1744"/>
      <stop offset="100%" stop-color="#b3001b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#7a0012" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,59,59,0.04)" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Glow behind button -->
  <ellipse cx="118" cy="100" rx="80" ry="80" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Button shadow -->
  <ellipse cx="118" cy="158" rx="52" ry="10" fill="#7a0012" opacity="0.6"/>

  <!-- Button body -->
  <circle cx="118" cy="100" r="62" fill="url(#btnGrad)" filter="url(#softShadow)"/>

  <!-- Button highlight -->
  <ellipse cx="100" cy="78" rx="22" ry="14" fill="rgba(255,255,255,0.18)" transform="rotate(-15 100 78)"/>

  <!-- Button rim -->
  <circle cx="118" cy="100" r="62" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- 押す! text on button -->
  <text x="118" y="108" text-anchor="middle" font-family="'Hiragino Sans','Yu Gothic',sans-serif"
        font-size="22" font-weight="900" fill="rgba(255,255,255,0.92)" letter-spacing="-0.5">押す！</text>

  <!-- Main title: 早押しボタン -->
  <text x="226" y="88" font-family="'Hiragino Sans','Yu Gothic',sans-serif"
        font-size="46" font-weight="900" fill="#ff3b3b" letter-spacing="-1"
        style="text-shadow:0 0 40px rgba(255,59,59,0.6)">早押しボタン</text>

  <!-- Red glow on title (faked with a slightly transparent copy) -->
  <text x="226" y="88" font-family="'Hiragino Sans','Yu Gothic',sans-serif"
        font-size="46" font-weight="900" fill="rgba(255,80,80,0.18)" letter-spacing="-1"
        filter="url(#blur)">早押しボタン</text>

  <!-- Subtitle: HAYAOSHI BUTTON -->
  <text x="228" y="118" font-family="'Courier New',monospace"
        font-size="15" font-weight="700" fill="rgba(255,255,255,0.35)" letter-spacing="6">HAYAOSHI BUTTON</text>

  <!-- Tagline -->
  <text x="228" y="152" font-family="'Hiragino Sans','Yu Gothic',sans-serif"
        font-size="14" fill="rgba(255,255,255,0.45)" letter-spacing="0.02em">リアルタイム早押しクイズ · Real-time Quiz Buzzer</text>

  <!-- Divider line -->
  <line x1="228" y1="128" x2="720" y2="128" stroke="rgba(255,59,59,0.2)" stroke-width="1"/>

  <!-- Bottom badge: Firebase + No server -->
  <g transform="translate(228, 162)">
    <rect width="120" height="24" rx="12" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.25)" stroke-width="1"/>
    <text x="60" y="16" text-anchor="middle" font-family="'Courier New',monospace"
          font-size="11" fill="rgba(255,213,74,0.8)" letter-spacing="1">⚡ Firebase</text>
  </g>
  <g transform="translate(358, 162)">
    <rect width="120" height="24" rx="12" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.25)" stroke-width="1"/>
    <text x="60" y="16" text-anchor="middle" font-family="'Courier New',monospace"
          font-size="11" fill="rgba(255,213,74,0.8)" letter-spacing="1">🚫 No Server</text>
  </g>
  <g transform="translate(488, 162)">
    <rect width="120" height="24" rx="12" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.25)" stroke-width="1"/>
    <text x="60" y="16" text-anchor="middle" font-family="'Courier New',monospace"
          font-size="11" fill="rgba(255,213,74,0.8)" letter-spacing="1">👥 100 Players</text>
  </g>
</svg>
