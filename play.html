<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>早押しボタン</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; background: #0d0d14; color: #fff; user-select: none; overflow: hidden;
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .top { position: fixed; top: 16px; left: 0; right: 0; text-align: center; }
  .room { font-size: 12px; color: rgba(255,255,255,.3); letter-spacing: 3px; }
  .name-tag { font-size: 20px; font-weight: 700; color: rgba(255,255,255,.7);
    display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px; }
  .my-emoji { font-size: 26px; }
  .score-line { font-size: 14px; color: rgba(255,255,255,.45); margin-bottom: 28px; }
  .score-line b { color: #ff5252; font-size: 18px; }
  .qnum { font-size: 15px; color: #ffd54a; font-weight: 700; margin-bottom: 22px; letter-spacing:.05em; }

  .buzz-btn { width: 240px; height: 240px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 35% 32%, #ff7878, #ff1744, #b3001b);
    color: #fff; font-size: 52px; font-weight: 900; letter-spacing: -1px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 0 #7a0012, 0 16px 44px rgba(255,23,68,.45);
    transition: transform .08s, box-shadow .08s; font-family: inherit; }
  .buzz-btn:active { transform: translateY(7px) scale(.96); box-shadow: 0 3px 0 #7a0012, 0 6px 20px rgba(255,23,68,.3); }
  .buzz-btn.locked { background: radial-gradient(circle at 35% 32%, #555, #333); box-shadow: 0 6px 0 #1a1a1a;
    cursor: default; color: rgba(255,255,255,.5); }
  .buzz-btn.mine { background: radial-gradient(circle at 35% 32%, #ffe066, #ffaa00); color:#0d0d14;
    box-shadow: 0 6px 0 #b35900, 0 12px 36px rgba(255,170,0,.5); }

  .status { margin-top: 30px; font-size: 17px; min-height: 26px; text-align: center; font-weight: 700; }
  .status.answering { color: #ffd54a; }
  .hint { margin-top: 8px; font-size: 12px; color: rgba(255,255,255,.25); }
  .yaji-btn { margin-top: 22px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,213,74,.4);
    color: #ffd54a; border-radius: 999px; padding: 11px 22px; font-size: 15px; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: transform .08s; }
  .yaji-btn:active { transform: scale(.94); }

  .overlay { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; z-index: 50;
    opacity: 0; pointer-events: none; transition: opacity .3s; background: rgba(13,13,20,.9); }
  .overlay.show { opacity: 1; }
  .overlay .big { font-size: 90px; font-weight: 900; }
  .overlay .who { font-size: 22px; color: #fff; }
  .overlay.correct .big { color: #4caf50; text-shadow: 0 0 40px rgba(76,175,80,.6); }
  .overlay.wrong .big { color: #ff5252; text-shadow: 0 0 40px rgba(255,82,82,.6); }
  .credit { position: fixed; bottom: 12px; font-size: 10px; color: rgba(255,255,255,.18); }
  .credit a { color: rgba(255,59,59,.3); text-decoration: none; }
</style>
</head>
<body>
  <div class="top">
    <div class="name-tag"><span class="my-emoji" id="myEmoji"></span><span id="myName"></span></div>
    <div class="room" id="roomCode"></div>
  </div>

  <div class="qnum" id="qnum">第 1 問</div>
  <div class="score-line">あなたの得点：<b id="myScore">0</b></div>
  <button class="buzz-btn" id="buzzBtn">押す！</button>
  <div class="status" id="status"></div>
  <div class="hint" id="hint">早く押した人だけが回答できるよ</div>
  <button class="yaji-btn" id="yajiBtn" onclick="throwYaji()">🗣️ ヤジを飛ばす</button>

  <div class="overlay" id="overlay"><div class="big" id="ovBig"></div><div class="who" id="ovWho"></div></div>
  <div class="credit">🎤 by <a href="https://instagram.com/hrxm" target="_blank">@hrxm</a> · 🍸 x-garden</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="common.js"></script>
  <script>
    const code = sanitizeCode(param('room'));
    const pid  = sanitizeId(param('pid'));
    if (!code || !pid) location.href = 'index.html';
    document.getElementById('roomCode').textContent = 'ROOM ' + code;

    const roomRef = db.ref('rooms/' + code);
    let myName = '', myEmoji = '', currentBuzz = null, lastResultTs = 0, lastYajiTs = 0;

    // 自分の情報＆得点
    roomRef.child('players/' + pid).on('value', s => {
      const p = s.val();
      if (!p) { location.href = 'index.html'; return; }
      myName = p.name; myEmoji = p.emoji;
      document.getElementById('myName').textContent = p.name;
      document.getElementById('myEmoji').textContent = p.emoji;
      document.getElementById('myScore').textContent = p.score || 0;
    });

    // 問題番号
    roomRef.child('meta/questionNumber').on('value', s => {
      document.getElementById('qnum').textContent = '第 ' + (s.val() || 1) + ' 問';
    });

    // 早押し状態
    roomRef.child('buzz').on('value', s => {
      currentBuzz = s.val();
      renderBuzz();
    });

    // 判定（正解/不正解）演出
    roomRef.child('meta/result').on('value', s => {
      const r = s.val();
      if (!r || !r.ts || r.ts === lastResultTs) return;
      lastResultTs = r.ts;
      showResult(r.type, r.name);
    });

    // ヤジ（全員に同期して鳴らす）
    roomRef.child('yaji').on('value', s => {
      const y = s.val();
      if (!y || !y.ts || y.ts === lastYajiTs) return;
      lastYajiTs = y.ts;
      playYaji(y.i);
    });

    function throwYaji() {
      ctx();
      const i = Math.floor(Math.random() * 3);
      roomRef.child('yaji').set({ ts: Date.now(), i: i }); // 鳴らすのはリスナー側（自分含む全員）
    }

    function renderBuzz() {
      const btn = document.getElementById('buzzBtn');
      const status = document.getElementById('status');
      btn.classList.remove('locked', 'mine');
      if (!currentBuzz) {
        btn.textContent = '押す！';
        btn.disabled = false;
        status.textContent = '';
        status.className = 'status';
      } else if (currentBuzz.id === pid) {
        btn.textContent = '✋'; btn.classList.add('mine'); btn.disabled = true;
        status.textContent = 'あなたが回答中！'; status.className = 'status answering';
      } else {
        btn.textContent = '🔒'; btn.classList.add('locked'); btn.disabled = true;
        status.textContent = (currentBuzz.emoji || '') + ' ' + currentBuzz.name + ' さんが回答中';
        status.className = 'status answering';
      }
    }

    document.getElementById('buzzBtn').addEventListener('click', pressBuzz);
    function pressBuzz() {
      if (currentBuzz) return;
      ctx(); // オーディオ解錠（最初のタップ）
      roomRef.child('buzz').transaction(cur => {
        if (cur === null) {
          return { id: pid, name: myName, emoji: myEmoji, ts: firebase.database.ServerValue.TIMESTAMP };
        }
        return; // 既に誰かが押している → 中止
      }, (err, committed, snap) => {
        if (!err && committed) { playBuzz(); flash(); }
      });
    }

    function showResult(type, name) {
      const ov = document.getElementById('overlay');
      document.getElementById('ovBig').textContent = type === 'correct' ? '⭕' : '❌';
      document.getElementById('ovWho').textContent =
        (name ? name + ' さん' : '') + (type === 'correct' ? ' 正解！ +1点' : ' 残念…');
      ov.className = 'overlay show ' + type;
      if (type === 'correct') playCorrect(); else playWrong();
      flash(type === 'correct' ? 'rgba(76,175,80,.15)' : 'rgba(255,82,82,.15)');
      setTimeout(() => { ov.className = 'overlay'; }, 2200);
    }

    // モバイルのダブルタップ拡大防止（リンク以外）
    document.addEventListener('touchend', e => { if (!e.target.closest('a')) e.preventDefault(); }, { passive: false });
  </script>
</body>
</html>
